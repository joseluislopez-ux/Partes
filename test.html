<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>IU Gestión</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a1a;color:#fff;min-height:100vh}
.hide{display:none!important}
button{cursor:pointer;border:none;border-radius:8px;font-size:16px;padding:12px 20px;font-weight:600}
select,input,textarea{width:100%;padding:12px;border-radius:8px;border:1px solid #444;background:#2a2a2a;color:#fff;font-size:16px;margin-top:4px}
textarea{resize:vertical;min-height:80px}
label{display:block;margin-top:14px;font-size:14px;color:#aaa}

/* LOGIN */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#loginScreen h1{font-size:22px;margin-bottom:24px;color:#f90}
.workers-grid{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
.worker-btn{background:#2a2a2a;color:#fff;border:2px solid #444;border-radius:12px;padding:16px;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px;transition:all 0.15s}
.worker-btn:active,.worker-btn.selected{border-color:#f90;color:#f90;background:#2a2a1a}
#pinBox{width:100%;max-width:300px;margin-top:16px}
#pinBox input{text-align:center;font-size:24px;letter-spacing:8px}
#pinBox button{margin-top:12px;background:#f90;color:#000;width:100%;padding:14px}

/* APP */
#appScreen{padding:16px;max-width:500px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.header h2{font-size:20px}
.header button{background:transparent;color:#f90;font-size:14px;padding:6px 12px;border:1px solid #f90}

/* FICHAJE */
.fichaje-box{background:#222;border-radius:12px;padding:16px;margin-bottom:16px}
.fichaje-box h3{color:#f90;margin-bottom:12px;font-size:15px}
.fichaje-btns{display:flex;gap:10px;margin-bottom:14px}
.btn-entrada{background:#2e7d32;color:#fff;flex:1}
.btn-salida{background:#c62828;color:#fff;flex:1}
.btn-entrada:disabled,.btn-salida:disabled{opacity:0.4}
.fichaje-info{display:flex;justify-content:space-between;font-size:14px;color:#aaa}
.fichaje-info .hora{color:#fff;font-size:18px;font-weight:700}
.contador{text-align:center;font-size:36px;font-weight:700;color:#f90;margin:10px 0}
.ubicacion{font-size:12px;color:#888;margin-top:6px}
.ubicacion a{color:#4fc3f7}

/* OBRA */
.obra-bar{background:#2a2a2a;padding:12px;border-radius:8px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.obra-bar span{font-size:16px;font-weight:600}

/* TAREAS */
.tareas-box{background:#222;border-radius:12px;padding:16px}
.tareas-box h3{color:#f90;margin-bottom:4px;font-size:15px}
.btn-guardar{background:#f90;color:#000;width:100%;margin-top:16px}
.btn-guardar:disabled{opacity:0.4}
.retrabajo-row{display:flex;align-items:center;gap:8px;margin-top:14px}
.retrabajo-row input{width:auto}
.msg{padding:10px;border-radius:8px;margin-top:10px;font-size:14px;text-align:center}
.msg-ok{background:#1b5e20;color:#a5d6a7}
.msg-err{background:#b71c1c;color:#ef9a9a}
.legal{font-size:11px;color:#666;text-align:center;margin-top:12px}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <h1>🏗️ Industria Urbana</h1>
  <div class="workers-grid" id="workersGrid">
    <button class="worker-btn" onclick="selectWorker('luis','Luis')">Luis</button>
    <button class="worker-btn" onclick="selectWorker('senon','Senon')">Senon</button>
    <button class="worker-btn" onclick="selectWorker('eligio','Eligio')">Eligio</button>
    <button class="worker-btn" onclick="selectWorker('jona','Jona')">Jona</button>
    <button class="worker-btn" onclick="selectWorker('jose','Jose')">Jose</button>
    <button class="worker-btn" onclick="selectWorker('pruebas','Pruebas')">Pruebas</button>
  </div>
  <div id="pinBox" class="hide">
    <p style="text-align:center;color:#aaa;margin-bottom:4px;font-size:14px" id="pinLabel">PIN</p>
    <input type="password" id="inputPin" placeholder="····" inputmode="numeric" maxlength="4">
    <button onclick="doLogin()">Entrar</button>
  </div>
  <div id="loginMsg" class="msg hide"></div>
</div>

<!-- ===== APP ===== -->
<div id="appScreen" class="hide">
  <div class="header">
    <h2 id="userName">—</h2>
    <button onclick="doLogout()">Salir</button>
  </div>

  <!-- FICHAJE (arriba) -->
  <div class="fichaje-box">
    <h3>FICHAJE DE JORNADA</h3>
    <div class="fichaje-btns">
      <button class="btn-entrada" id="btnEntrada" onclick="fichar('entrada')">▶ Entrada</button>
      <button class="btn-salida" id="btnSalida" onclick="fichar('salida')" disabled>■ Salida</button>
    </div>
    <div class="contador" id="contador">00:00:00</div>
    <div class="fichaje-info">
      <div>Entrada: <span class="hora" id="horaEntrada">—</span></div>
      <div>Salida: <span class="hora" id="horaSalida">—</span></div>
    </div>
    <div class="ubicacion" id="ubicacionEntrada"></div>
    <div class="ubicacion" id="ubicacionSalida"></div>
  </div>

  <!-- OBRA (debajo de fichaje) -->
  <div class="obra-bar">
    <span id="obraActual">— Selecciona obra —</span>
    <button onclick="mostrarCambioObra()" style="background:#444;color:#fff;font-size:13px;padding:6px 10px">Cambiar</button>
  </div>
  <div id="cambioObra" class="hide" style="margin-bottom:16px">
    <select id="selObra" onchange="cambiarObra()">
      <option value="">— Selecciona obra —</option>
      <option>ARROYO MURO VECINO</option>
      <option>ARROYO</option>
      <option>SANTA LUCIA</option>
      <option>MARQUES DE SANTILLANA</option>
      <option>BURGOS</option>
      <option>TRILLA</option>
      <option>CISTERNIGA</option>
      <option>TERESA GIL</option>
      <option>PEÑA</option>
      <option>LG10 ZONAS COMUNES</option>
      <option>BAJO IZQ LG10</option>
      <option>BAJO DER LG10</option>
      <option>ENTREPLANTA IZQ LG10</option>
      <option>ENTREPLANTA DER LG10</option>
      <option>1 IZQ LG10</option>
      <option>1 DER LG10</option>
      <option>2 IZQ LG10</option>
      <option>2 DER LG10</option>
      <option>3 IZQ LG10</option>
      <option>3 DER LG10</option>
      <option>4 IZQ LG10</option>
      <option>4 DER LG10</option>
      <option>OTROS (ESPECIFICAR)</option>
    </select>
  </div>

  <!-- TAREAS -->
  <div class="tareas-box">
    <h3>TAREAS DE HOY</h3>
    <label>Oficio
      <select id="selOficio">
        <option value="">— Selecciona oficio —</option>
        <option>LIMPIEZA</option>
        <option>TRANSPORTE MATERIALES</option>
        <option>DEMOLICIÓN / ROZAS</option>
        <option>PREPARACIÓN SUPERFICIES</option>
        <option>ALBAÑILERÍA</option>
        <option>PLADUR</option>
        <option>PINTURA / ALISADO</option>
        <option>ELECTRICIDAD</option>
        <option>FONTANERÍA</option>
        <option>MONTAJE</option>
        <option>COMPRAS</option>
        <option>DESPLAZAMIENTOS</option>
        <option>OTROS</option>
      </select>
    </label>
    <label>Horas
      <input type="number" id="inputHoras" value="1" min="0.5" max="12" step="0.5">
    </label>
    <label>Descripción
      <textarea id="inputDesc" placeholder="¿Qué has hecho?"></textarea>
    </label>
    <div class="retrabajo-row">
      <input type="checkbox" id="chkRetrabajo">
      <span>Retrabajo</span>
    </div>
    <button class="btn-guardar" id="btnGuardar" onclick="guardarTarea()">Guardar tarea</button>
    <div id="tareaMsg" class="msg hide"></div>
    <div id="tareasListBox" style="margin-top:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:#aaa">Tareas guardadas hoy</span>
        <span style="font-size:18px;font-weight:700;color:#f90" id="totalHoras">0h</span>
      </div>
      <div id="tareasList" style="margin-top:8px"></div>
    </div>
  </div>

  <p class="legal">📋 Registro conforme al RD-ley 8/2019 · Datos tratados según política LOPD</p>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwXE6um7Rb9c_N-bO-TR2JEAsWpdX8zHBVjqERi3Ub20W8cE1c7vIhswucv2PlepH4JWQ/exec';
var usuario = null;
var obraActual = '';
var horaEntradaStr = '';
var contadorInterval = null;
var selectedWorkerId = '';

// Coordenadas de obras hardcodeadas
var obrasCoords = {
  'ARROYO MURO VECINO': {lat:41.61792565736123, lon:-4.781063003028537},
  'ARROYO': {lat:41.61792565736123, lon:-4.781063003028537},
  'SANTA LUCIA': {lat:41.650344915455484, lon:-4.716467463124058},
  'MARQUES DE SANTILLANA': {lat:41.66201433037437, lon:-4.720410060697662},
  'LG10 ZONAS COMUNES': {lat:41.650027923878525, lon:-4.723832203027283},
  'BAJO IZQ LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  'BAJO DER LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  'ENTREPLANTA IZQ LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  'ENTREPLANTA DER LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  '1 IZQ LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  '1 DER LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  '2 IZQ LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  '2 DER LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  '3 IZQ LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  '3 DER LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  '4 IZQ LG10': {lat:41.650027923878525, lon:-4.723832203027283},
  '4 DER LG10': {lat:41.650027923878525, lon:-4.723832203027283}
};

// ── API ──
function api(data) {
  return fetch(SCRIPT_URL, {
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(data)
  }).then(function(r){return r.json();});
}

// ── LOGIN ──
function selectWorker(id, nombre) {
  selectedWorkerId = id;
  var btns = document.querySelectorAll('.worker-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.remove('selected');
  event.target.classList.add('selected');
  document.getElementById('pinBox').classList.remove('hide');
  document.getElementById('pinLabel').textContent = 'PIN para ' + nombre;
  document.getElementById('inputPin').value = '';
  document.getElementById('inputPin').focus();
}

function doLogin() {
  var pin = document.getElementById('inputPin').value;
  if(!selectedWorkerId||!pin) return showMsg('loginMsg','Selecciona trabajador e introduce PIN',true);
  showMsg('loginMsg','Entrando...',false);
  api({action:'login',id:selectedWorkerId,pin:pin}).then(function(r){
    if(!r.ok) return showMsg('loginMsg',r.error,true);
    usuario={id:r.id,nombre:r.nombre};
    document.getElementById('loginScreen').classList.add('hide');
    document.getElementById('appScreen').classList.remove('hide');
    document.getElementById('userName').textContent=r.nombre;
    cargarEstado();
  }).catch(function(){showMsg('loginMsg','Error de conexión',true);});
}

function doLogout() {
  usuario=null;horaEntradaStr='';selectedWorkerId='';obraActual='';
  if(contadorInterval)clearInterval(contadorInterval);
  document.getElementById('appScreen').classList.add('hide');
  document.getElementById('loginScreen').classList.remove('hide');
  document.getElementById('inputPin').value='';
  document.getElementById('pinBox').classList.add('hide');
  document.getElementById('loginMsg').classList.add('hide');
  document.getElementById('obraActual').textContent='— Selecciona obra —';
  document.getElementById('horaEntrada').textContent='—';
  document.getElementById('horaSalida').textContent='—';
  document.getElementById('contador').textContent='00:00:00';
  document.getElementById('ubicacionEntrada').innerHTML='';
  document.getElementById('ubicacionSalida').innerHTML='';
  var btns=document.querySelectorAll('.worker-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('selected');
}

// ── ESTADO ──
function cargarEstado() {
  api({action:'getEstado',id:usuario.id}).then(function(r){
    if(!r.ok) return;
    if(r.fichaje){
      horaEntradaStr=r.horaEntrada;
      obraActual=r.obra;
      document.getElementById('obraActual').textContent=obraActual||'—';
      document.getElementById('horaEntrada').textContent=horaEntradaStr;
      document.getElementById('btnEntrada').disabled=true;
      document.getElementById('btnSalida').disabled=false;
      iniciarContador();
      if(r.lat&&r.lon) mostrarUbicacion('ubicacionEntrada',r.lat,r.lon,'Entrada');
    }
    cargarTareas();
  });
}

// ── OBRA ──
function mostrarCambioObra(){document.getElementById('cambioObra').classList.toggle('hide');}
function cambiarObra(){
  var sel=document.getElementById('selObra').value;
  if(sel){obraActual=sel;document.getElementById('obraActual').textContent=sel;document.getElementById('cambioObra').classList.add('hide');}
}

// ── DISTANCIA GPS ──
function distanciaMetros(lat1,lon1,lat2,lon2){
  var R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function validarUbicacion(lat,lon){
  if(!obraActual) return {ok:false,msg:'Selecciona una obra primero'};
  var coords=obrasCoords[obraActual];
  if(!coords) return {ok:true}; // Sin coordenadas = no validar
  if(!lat||!lon) return {ok:true}; // Sin GPS = dejar pasar
  var dist=distanciaMetros(lat,lon,coords.lat,coords.lon);
  if(dist>200) return {ok:false,msg:'⚠ Ubicación no coincide con '+obraActual+' ('+Math.round(dist)+'m). Selecciona la obra correcta o acércate a la ubicación.'};
  return {ok:true};
}

// ── FICHAR ──
function fichar(tipo){
  if(!obraActual&&tipo==='entrada') return alert('Selecciona una obra primero');
  var btn=tipo==='entrada'?document.getElementById('btnEntrada'):document.getElementById('btnSalida');
  btn.disabled=true;btn.textContent='Enviando...';

  getUbicacion(function(lat,lon){
    var check=validarUbicacion(lat,lon);
    if(!check.ok){
      alert(check.msg);btn.disabled=false;
      btn.textContent=tipo==='entrada'?'▶ Entrada':'■ Salida';return;
    }
    api({action:'fichar',id:usuario.id,tipo:tipo,obra:obraActual,lat:lat,lon:lon}).then(function(r){
      if(!r.ok){alert(r.error);btn.disabled=false;btn.textContent=tipo==='entrada'?'▶ Entrada':'■ Salida';return;}
      if(tipo==='entrada'){
        horaEntradaStr=r.horaEntrada;
        document.getElementById('horaEntrada').textContent=horaEntradaStr;
        document.getElementById('horaSalida').textContent='—';
        document.getElementById('btnEntrada').textContent='▶ Entrada';
        document.getElementById('btnEntrada').disabled=true;
        document.getElementById('btnSalida').disabled=false;
        iniciarContador();
        mostrarUbicacion('ubicacionEntrada',lat,lon,'Entrada');
        document.getElementById('ubicacionSalida').innerHTML='';
      } else {
        document.getElementById('horaSalida').textContent=r.horaSalida;
        document.getElementById('btnSalida').textContent='■ Salida';
        document.getElementById('btnSalida').disabled=true;
        document.getElementById('btnEntrada').disabled=false;
        if(contadorInterval)clearInterval(contadorInterval);
        mostrarUbicacion('ubicacionSalida',r.latSalida,r.lonSalida,'Salida');
      }
    }).catch(function(){alert('Error de conexión');btn.disabled=false;btn.textContent=tipo==='entrada'?'▶ Entrada':'■ Salida';});
  });
}

// ── CONTADOR ──
function iniciarContador(){
  if(contadorInterval)clearInterval(contadorInterval);
  if(!horaEntradaStr)return;
  var p=horaEntradaStr.split(':'),hE=parseInt(p[0]),mE=parseInt(p[1]);
  function act(){
    var a=new Date(),sT=(a.getHours()*3600+a.getMinutes()*60+a.getSeconds())-(hE*3600+mE*60);
    if(sT<0)sT=0;
    document.getElementById('contador').textContent=pad(Math.floor(sT/3600))+':'+pad(Math.floor((sT%3600)/60))+':'+pad(sT%60);
  }
  act();contadorInterval=setInterval(act,1000);
}
function pad(n){return n<10?'0'+n:''+n;}

// ── UBICACIÓN ──
function getUbicacion(cb){
  if(!navigator.geolocation)return cb('','');
  navigator.geolocation.getCurrentPosition(
    function(pos){cb(pos.coords.latitude,pos.coords.longitude);},
    function(){cb('','');},
    {enableHighAccuracy:true,timeout:10000}
  );
}
function mostrarUbicacion(elId,lat,lon,label){
  if(!lat||!lon)return;
  var latN=parseFloat(lat),lonN=parseFloat(lon);
  if(Math.abs(latN)>1000){latN/=1000000;lonN/=1000000;}
  document.getElementById(elId).innerHTML='📍 '+label+': <a href="https://www.google.com/maps?q='+latN+','+lonN+'" target="_blank">Ver en mapa</a>';
}

// ── GUARDAR TAREA ──
function guardarTarea(){
  var oficio=document.getElementById('selOficio').value;
  var horas=document.getElementById('inputHoras').value;
  var desc=document.getElementById('inputDesc').value;
  var retrabajo=document.getElementById('chkRetrabajo').checked;
  if(!oficio)return showMsg('tareaMsg','Selecciona un oficio',true);
  if(!desc.trim())return showMsg('tareaMsg','Escribe una descripción',true);
  document.getElementById('btnGuardar').disabled=true;
  document.getElementById('btnGuardar').textContent='Guardando...';
  api({action:'guardarTarea',id:usuario.id,obra:obraActual,oficio:oficio,horas:horas,descripcion:desc,retrabajo:retrabajo}).then(function(r){
    document.getElementById('btnGuardar').disabled=false;
    document.getElementById('btnGuardar').textContent='Guardar tarea';
    if(r.ok){showMsg('tareaMsg','✅ Tarea guardada',false);document.getElementById('inputDesc').value='';document.getElementById('chkRetrabajo').checked=false;cargarTareas();}
    else showMsg('tareaMsg',r.error,true);
  }).catch(function(){
    document.getElementById('btnGuardar').disabled=false;
    document.getElementById('btnGuardar').textContent='Guardar tarea';
    showMsg('tareaMsg','Error de conexión',true);
  });
}

// ── CARGAR TAREAS HOY ──
function cargarTareas(){
  api({action:'getTareasHoy',id:usuario.id}).then(function(r){
    if(!r.ok)return;
    document.getElementById('totalHoras').textContent=r.totalHoras+'h';
    var html='';
    for(var i=0;i<r.tareas.length;i++){
      var t=r.tareas[i];
      html+='<div style="background:#2a2a2a;border-radius:6px;padding:10px;margin-bottom:6px;font-size:13px">'
        +'<div style="display:flex;justify-content:space-between">'
        +'<span style="color:#f90;font-weight:600">'+t.oficio+'</span>'
        +'<span style="color:#fff;font-weight:700">'+t.horas+'h</span></div>'
        +'<div style="color:#aaa;margin-top:4px">'+t.descripcion+'</div>'
        +(t.retrabajo?'<span style="color:#ef5350;font-size:11px">⚠ Retrabajo</span>':'')
        +'</div>';
    }
    if(!r.tareas.length)html='<div style="color:#666;font-size:13px;text-align:center;padding:10px">Sin tareas registradas hoy</div>';
    document.getElementById('tareasList').innerHTML=html;
  });
}

// ── UTILS ──
function showMsg(elId,text,isErr){
  var el=document.getElementById(elId);
  el.textContent=text;el.className='msg '+(isErr?'msg-err':'msg-ok');el.classList.remove('hide');
  setTimeout(function(){el.classList.add('hide');},4000);
}
</script>
</body>
</html>
